<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Calendar</title>
  <style>
    :root {
      --bg: #07101d;
      --panel: #0d1726;
      --panel-2: #111d2f;
      --cell: #142235;
      --cell-2: #101b2c;
      --border: rgba(148, 163, 184, 0.16);
      --text: #f8fafc;
      --muted: #9aa8bd;
      --income: #4ade80;
      --expense: #fb7185;
      --net: #e5e7eb;
      --blue: #3b82f6;
      --purple: #a78bfa;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.18), transparent 28%),
        linear-gradient(135deg, #060b14, var(--bg));
      color: var(--text);
      padding: 22px;
    }

    .app {
      max-width: 1380px;
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px;
      background: rgba(8, 15, 28, 0.82);
      box-shadow: var(--shadow);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button, select {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.8);
      color: var(--text);
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      outline: none;
    }

    button:hover, select:hover { border-color: rgba(59, 130, 246, 0.65); }

    .arrow {
      width: 44px;
      padding: 12px 0;
      font-size: 22px;
      line-height: 1;
    }

    .today-btn {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 18px;
      margin-bottom: 22px;
    }

    .summary-card {
      min-height: 112px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      background: linear-gradient(145deg, rgba(19, 32, 51, 0.98), rgba(13, 23, 38, 0.96));
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.18);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .summary-card .label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .summary-card .value {
      font-size: clamp(22px, 2.2vw, 30px);
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .summary-card.income .label, .summary-card.income .value { color: var(--income); }
    .summary-card.expense .label, .summary-card.expense .value { color: var(--expense); }
    .summary-card.balance .label, .summary-card.balance .value { color: var(--blue); }
    .summary-card.average .label, .summary-card.average .value { color: var(--purple); }

    .icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 28px;
      background: rgba(255, 255, 255, 0.1);
    }

    .calendar-panel {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      background: linear-gradient(145deg, rgba(16, 28, 45, 0.96), rgba(11, 20, 34, 0.98));
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 14px;
      text-align: center;
      color: #e5e7eb;
      font-weight: 900;
    }

    .weekday { padding: 8px 0; }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day {
      min-height: 144px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: linear-gradient(145deg, rgba(22, 36, 56, 0.98), rgba(15, 27, 44, 0.98));
      padding: 14px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .day:hover { border-color: rgba(59, 130, 246, 0.7); }
    .day.selected { outline: 3px solid #2563eb; outline-offset: -3px; }
    .day.other { opacity: 0.45; }

    .day-number {
      font-size: 21px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .today-dot {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #d97706;
      box-shadow: 0 0 0 5px rgba(217, 119, 6, 0.08);
    }

    .money-lines {
      display: grid;
      gap: 8px;
      text-align: center;
      margin-top: 8px;
      font-weight: 900;
    }

    .money-lines input {
      width: 100%;
      background: transparent;
      border: 0;
      text-align: center;
      font-size: 16px;
      font-weight: 900;
      outline: none;
    }

    .income-input { color: var(--income); }
    .expense-input { color: var(--expense); }
    .net-line { color: var(--net); font-size: 16px; }

    .legend {
      display: flex;
      justify-content: center;
      gap: 34px;
      margin-top: 22px;
      color: var(--text);
      font-weight: 600;
      flex-wrap: wrap;
    }

    .legend span { display: inline-flex; align-items: center; gap: 8px; }
    .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
    .dot.income { background: var(--income); }
    .dot.expense { background: var(--expense); }
    .dot.net { background: var(--net); }

    @media (max-width: 1000px) {
      .summary { grid-template-columns: repeat(2, 1fr); }
      .day { min-height: 126px; padding: 10px; }
    }

    @media (max-width: 720px) {
      body { padding: 10px; }
      .app { padding: 12px; }
      .summary { grid-template-columns: 1fr; }
      .calendar-panel { padding: 12px; overflow-x: auto; }
      .weekdays, .calendar-grid { min-width: 820px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div class="controls">
        <button class="arrow" id="prevBtn">‹</button>
        <select id="monthSelect"></select>
        <button class="arrow" id="nextBtn">›</button>
        <select id="yearSelect"></select>
        <select id="startDaySelect">
          <option value="0">Start Day</option>
          <option value="0">Sunday</option>
          <option value="1">Monday</option>
        </select>
      </div>
      <button class="today-btn" id="todayBtn">▣ Today</button>
    </div>

    <section class="summary">
      <div class="summary-card income">
        <div><div class="label">Income From Homepage</div><div class="value" id="totalIncome">$0.00</div></div>
        <div class="icon">↑</div>
      </div>
      <div class="summary-card expense">
        <div><div class="label">Calendar Editing</div><div class="value" id="totalExpense">Locked</div></div>
        <div class="icon">🔒</div>
      </div>
      <div class="summary-card balance">
        <div><div class="label">Net Income</div><div class="value" id="totalNet">$0.00</div></div>
        <div class="icon">=</div>
      </div>
      <div class="summary-card average">
        <div><div class="label">Avg Income / Day</div><div class="value" id="averageDay">$0.00</div></div>
        <div class="icon">⌁</div>
      </div>
    </section>

    <section class="calendar-panel">
      <div class="weekdays" id="weekdays"></div>
      <div class="calendar-grid" id="calendarGrid"></div>
      <div class="legend">
        <span><i class="dot income"></i> Income Only</span>
      </div>
    </section>
  </main>

  <script>
    const calendarGrid = document.getElementById("calendarGrid");
    const weekdaysEl = document.getElementById("weekdays");
    const monthSelect = document.getElementById("monthSelect");
    const yearSelect = document.getElementById("yearSelect");
    const startDaySelect = document.getElementById("startDaySelect");
    const totalIncomeEl = document.getElementById("totalIncome");
    const totalExpenseEl = document.getElementById("totalExpense");
    const totalNetEl = document.getElementById("totalNet");
    const averageDayEl = document.getElementById("averageDay");

    const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const weekNamesSunday = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
    const weekNamesMonday = ["MON", "TUE", "WED", "THU", "FRI", "SAT", "SUN"];
    const today = new Date();

    let state = {
      month: today.getMonth(),
      year: today.getFullYear(),
      startDay: 0,
      selected: today.getDate()
    };

    function money(num) {
      return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" }).format(num || 0);
    }

    function key(year, month, day) {
      return `budget-${year}-${month + 1}-${day}`;
    }

    function getSaved(day) {
      const saved = localStorage.getItem(key(state.year, state.month, day));
      return saved ? JSON.parse(saved) : { income: "", expense: "" };
    }

    function saveDay(day, income, expense) {
      localStorage.setItem(key(state.year, state.month, day), JSON.stringify({ income, expense }));
      updateSummary();
    }

    function buildSelectors() {
      monthSelect.innerHTML = monthNames.map((m, i) => `<option value="${i}">${m}</option>`).join("");
      const startYear = today.getFullYear() - 3;
      const years = Array.from({ length: 8 }, (_, i) => startYear + i);
      yearSelect.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join("");
      syncSelectors();
    }

    function syncSelectors() {
      monthSelect.value = state.month;
      yearSelect.value = state.year;
      startDaySelect.value = state.startDay;
    }

    function renderWeekdays() {
      const names = state.startDay === 1 ? weekNamesMonday : weekNamesSunday;
      weekdaysEl.innerHTML = names.map(day => `<div class="weekday">${day}</div>`).join("");
    }

    function renderCalendar() {
      renderWeekdays();
      const daysInMonth = new Date(state.year, state.month + 1, 0).getDate();
      const prevMonthDays = new Date(state.year, state.month, 0).getDate();
      const firstDay = new Date(state.year, state.month, 1).getDay();
      const offset = state.startDay === 1 ? (firstDay + 6) % 7 : firstDay;
      const cells = [];

      for (let i = offset - 1; i >= 0; i--) {
        cells.push(dayBox(prevMonthDays - i, true));
      }

      for (let day = 1; day <= daysInMonth; day++) {
        cells.push(dayBox(day, false));
      }

      const totalCells = Math.max(35, Math.ceil(cells.length / 7) * 7);
      let nextDay = 1;
      while (cells.length < totalCells) {
        cells.push(dayBox(nextDay++, true));
      }

      calendarGrid.innerHTML = cells.join("");
      calendarGrid.querySelectorAll(".day:not(.other)").forEach(cell => {
        const day = Number(cell.dataset.day);

        cell.addEventListener("click", () => {
          state.selected = day;
          renderCalendar();
        });
      });
      updateSummary();
    }

    function dayBox(day, otherMonth) {
      const isToday = !otherMonth && day === today.getDate() && state.month === today.getMonth() && state.year === today.getFullYear();
      const isSelected = !otherMonth && day === state.selected;
      const data = otherMonth ? { income: "", expense: "" } : getSaved(day);
      const income = Number(data.income) || 0;
      const net = income;
      const incomeText = income > 0 ? money(income) : "No income";

      return `
        <div class="day ${otherMonth ? "other" : ""} ${isSelected ? "selected" : ""}" data-day="${day}">
          <div class="day-number">${day}</div>
          ${isToday ? `<div class="today-dot"></div>` : ""}
          ${otherMonth ? "" : `
            <div class="money-lines">
              <div class="income-input">${incomeText}</div>
              <div class="net-line">${income > 0 ? money(net) : ""}</div>
            </div>
          `}
        </div>`;
    }

    function updateSummary() {
      const daysInMonth = new Date(state.year, state.month + 1, 0).getDate();
      let income = 0;

      for (let day = 1; day <= daysInMonth; day++) {
        const data = getSaved(day);
        income += Number(data.income) || 0;
      }

      totalIncomeEl.textContent = money(income);
      totalExpenseEl.textContent = "Locked";
      totalNetEl.textContent = money(income);
      averageDayEl.textContent = money(income / 30);
    }

    document.getElementById("prevBtn").addEventListener("click", () => {
      state.month--;
      if (state.month < 0) { state.month = 11; state.year--; }
      state.selected = 1;
      syncSelectors();
      renderCalendar();
    });

    document.getElementById("nextBtn").addEventListener("click", () => {
      state.month++;
      if (state.month > 11) { state.month = 0; state.year++; }
      state.selected = 1;
      syncSelectors();
      renderCalendar();
    });

    document.getElementById("todayBtn").addEventListener("click", () => {
      state.month = today.getMonth();
      state.year = today.getFullYear();
      state.selected = today.getDate();
      syncSelectors();
      renderCalendar();
    });

    monthSelect.addEventListener("change", () => {
      state.month = Number(monthSelect.value);
      state.selected = 1;
      renderCalendar();
    });

    yearSelect.addEventListener("change", () => {
      state.year = Number(yearSelect.value);
      state.selected = 1;
      renderCalendar();
    });

    startDaySelect.addEventListener("change", () => {
      state.startDay = Number(startDaySelect.value);
      renderCalendar();
    });

    buildSelectors();
    renderCalendar();
  </script>
</body>
</html>
