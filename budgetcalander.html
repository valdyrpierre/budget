<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Calendar</title>
  <style>
    :root {
      --bg: #07101d;
      --panel: #0d1726;
      --panel-2: #111d2f;
      --cell: #142235;
      --cell-2: #101b2c;
      --border: rgba(148, 163, 184, 0.16);
      --text: #f8fafc;
      --muted: #9aa8bd;
      --income: #4ade80;
      --expense: #fb7185;
      --net: #e5e7eb;
      --blue: #3b82f6;
      --purple: #a78bfa;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.18), transparent 28%),
        linear-gradient(135deg, #060b14, var(--bg));
      color: var(--text);
      padding: 22px;
    }

    .app {
      max-width: 1380px;
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px;
      background: rgba(8, 15, 28, 0.82);
      box-shadow: var(--shadow);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button, select {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.8);
      color: var(--text);
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      outline: none;
    }

    button:hover, select:hover { border-color: rgba(59, 130, 246, 0.65); }

    .arrow {
      width: 44px;
      padding: 12px 0;
      font-size: 22px;
      line-height: 1;
    }

    .today-btn {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 18px;
      margin-bottom: 22px;
    }

    .summary-card {
      min-height: 112px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      background: linear-gradient(145deg, rgba(19, 32, 51, 0.98), rgba(13, 23, 38, 0.96));
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.18);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .summary-card .label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .summary-card .value {
      font-size: clamp(22px, 2.2vw, 30px);
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .summary-card.income .label, .summary-card.income .value { color: var(--income); }
    .summary-card.expense .label, .summary-card.expense .value { color: var(--expense); }
    .summary-card.balance .label, .summary-card.balance .value { color: var(--blue); }
    .summary-card.average .label, .summary-card.average .value { color: var(--purple); }

    .icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 28px;
      background: rgba(255, 255, 255, 0.1);
    }

    .calendar-panel {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      background: linear-gradient(145deg, rgba(16, 28, 45, 0.96), rgba(11, 20, 34, 0.98));
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 14px;
      text-align: center;
      color: #e5e7eb;
      font-weight: 900;
    }

    .weekday { padding: 8px 0; }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day {
      min-height: 144px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: linear-gradient(145deg, rgba(22, 36, 56, 0.98), rgba(15, 27, 44, 0.98));
      padding: 14px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .day:hover { border-color: rgba(59, 130, 246, 0.7); }
    .day.selected { outline: 3px solid #2563eb; outline-offset: -3px; }
    .day.other { opacity: 0.45; }

    .day-number {
      font-size: 21px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .today-dot {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #d97706;
      box-shadow: 0 0 0 5px rgba(217, 119, 6, 0.08);
    }

    .money-lines {
      display: grid;
      gap: 8px;
      text-align: center;
      margin-top: 8px;
      font-weight: 900;
      font-size: 13px;
      line-height: 1.2;
    }

    .money-lines input {
      width: 100%;
      background: transparent;
      border: 0;
      text-align: center;
      font-size: 16px;
      font-weight: 900;
      outline: none;
    }

    .income-input {
      color: var(--income);
      font-size: 14px;
      font-weight: 900;
      background: rgba(74, 222, 128, 0.14);
      border: 1px solid rgba(74, 222, 128, 0.24);
      border-radius: 999px;
      padding: 4px 8px;
    }

    .expense-input {
      color: var(--expense);
      font-size: 13px;
      font-weight: 800;
    }

    .net-line {
      color: var(--net);
      font-size: 13px;
      font-weight: 800;
    }

    .net-line.negative { color: var(--expense); }

    .legend {
      display: flex;
      justify-content: center;
      gap: 34px;
      margin-top: 22px;
      color: var(--text);
      font-weight: 600;
      flex-wrap: wrap;
    }

    .legend span { display: inline-flex; align-items: center; gap: 8px; }
    .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
    .dot.income { background: var(--income); }
    .dot.expense { background: var(--expense); }
    .dot.net { background: var(--net); }

    @media (max-width: 1000px) {
      .summary { grid-template-columns: repeat(2, 1fr); }
      .day { min-height: 126px; padding: 10px; }
    }

    @media (max-width: 720px) {
      body { padding: 10px; }
      .app { padding: 12px; }
      .summary { grid-template-columns: 1fr; }
      .calendar-panel { padding: 12px; overflow-x: auto; }
      .weekdays, .calendar-grid { min-width: 820px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div class="controls">
        <button class="arrow" id="prevBtn">‹</button>
        <select id="monthSelect"></select>
        <button class="arrow" id="nextBtn">›</button>
        <select id="yearSelect"></select>
        <select id="startDaySelect">
          <option value="0">Start Day</option>
          <option value="0">Sunday</option>
          <option value="1">Monday</option>
        </select>
      </div>
      <div class="controls">
        <a href="homepage.html" style="text-decoration:none;"><button class="today-btn" type="button">← Home</button></a>
        <button class="today-btn" id="todayBtn">▣ Today</button>
      </div>
    </div>

    <section class="summary">
      <div class="summary-card income">
        <div><div class="label">Income From Database</div><div class="value" id="totalIncome">$0.00</div></div>
        <div class="icon">↑</div>
      </div>
      <div class="summary-card expense">
        <div><div class="label">Spending</div><div class="value" id="totalExpense">$0.00</div></div>
        <div class="icon">↓</div>
      </div>
      <div class="summary-card balance">
        <div><div class="label">Net Income</div><div class="value" id="totalNet">$0.00</div></div>
        <div class="icon">=</div>
      </div>
      <div class="summary-card average">
        <div><div class="label">Avg Net / Day</div><div class="value" id="averageDay">$0.00</div></div>
        <div class="icon">⌁</div>
      </div>
    </section>

    <section class="calendar-panel">
      <div class="weekdays" id="weekdays"></div>
      <div class="calendar-grid" id="calendarGrid"></div>
      <div class="legend">
        <span><i class="dot income"></i> Income and net amount from the database</span>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const calendarGrid = document.getElementById("calendarGrid");
    const weekdaysEl = document.getElementById("weekdays");
    const monthSelect = document.getElementById("monthSelect");
    const yearSelect = document.getElementById("yearSelect");
    const startDaySelect = document.getElementById("startDaySelect");
    const totalIncomeEl = document.getElementById("totalIncome");
    const totalExpenseEl = document.getElementById("totalExpense");
    const totalNetEl = document.getElementById("totalNet");
    const averageDayEl = document.getElementById("averageDay");

    const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const weekNamesSunday = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
    const weekNamesMonday = ["MON", "TUE", "WED", "THU", "FRI", "SAT", "SUN"];
    const today = new Date();
    const SUPABASE_URL = "https://twzsvnegkhkhcgjjasik.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_nHkf-Zy3Tirn0XwLnGIsMw_MI-9zNhL";
    const TABLE_NAME = "daily_tracker";
    const SPENDING_TABLE = "daily_spending";

    let supabaseClient = null;
    let budgetCache = new Map();
    let loadingMonthKey = "";

    let state = {
      month: today.getMonth(),
      year: today.getFullYear(),
      startDay: 0,
      selected: today.getDate()
    };

    function money(num) {
      return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" }).format(num || 0);
    }

    function isSupabaseConfigured() {
      return !!(SUPABASE_URL && SUPABASE_ANON_KEY && SUPABASE_URL !== "PASTE_YOUR_SUPABASE_URL_HERE" && SUPABASE_ANON_KEY !== "PASTE_YOUR_SUPABASE_ANON_KEY_HERE");
    }

    function initSupabase() {
      if (!isSupabaseConfigured()) {
        return false;
      }
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      return true;
    }

    function key(year, month, day) {
      return `budget-${year}-${month + 1}-${day}`;
    }

    function dayDateKey(year, month, day) {
      return `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    }

    function getSaved(day) {
      const dateKey = dayDateKey(state.year, state.month, day);
      if (budgetCache.has(dateKey)) {
        return budgetCache.get(dateKey);
      }

      const saved = localStorage.getItem(key(state.year, state.month, day));
      const parsed = saved ? JSON.parse(saved) : { income: "", expense: "" };
      return {
        income: Number(parsed.income) || 0,
        expense: Number(parsed.expense) || 0
      };
    }

    function saveDay(day, income, expense) {
      const entry = { income: Number(income) || 0, expense: Number(expense) || 0 };
      budgetCache.set(dayDateKey(state.year, state.month, day), entry);
      localStorage.setItem(key(state.year, state.month, day), JSON.stringify(entry));
      updateSummary();
    }

    async function loadBudgetDataForMonth() {
      const monthKey = `${state.year}-${String(state.month + 1).padStart(2, "0")}`;
      if (loadingMonthKey === monthKey) {
        return;
      }

      loadingMonthKey = monthKey;
      const daysInMonth = new Date(state.year, state.month + 1, 0).getDate();
      const startDate = `${state.year}-${String(state.month + 1).padStart(2, "0")}-01`;
      const endDate = `${state.year}-${String(state.month + 1).padStart(2, "0")}-${String(daysInMonth).padStart(2, "0")}`;

      for (let day = 1; day <= daysInMonth; day += 1) {
        const entry = getSaved(day);
        budgetCache.set(dayDateKey(state.year, state.month, day), entry);
      }

      if (!initSupabase() || !supabaseClient) {
        renderCalendar();
        loadingMonthKey = "";
        return;
      }

      try {
        const [incomeResult, spendingResult] = await Promise.all([
          supabaseClient.from(TABLE_NAME).select("day_date, total_pay").gte("day_date", startDate).lte("day_date", endDate),
          supabaseClient.from(SPENDING_TABLE).select("entry_date, amount").gte("entry_date", startDate).lte("entry_date", endDate)
        ]);

        if (incomeResult.error) {
          throw incomeResult.error;
        }
        if (spendingResult.error) {
          throw spendingResult.error;
        }

        const incomeMap = new Map();
        (incomeResult.data || []).forEach((row) => {
          incomeMap.set(row.day_date, Number(row.total_pay) || 0);
        });

        const spendingMap = new Map();
        (spendingResult.data || []).forEach((row) => {
          spendingMap.set(row.entry_date, Number(row.amount) || 0);
        });

        for (let day = 1; day <= daysInMonth; day += 1) {
          const dateKey = dayDateKey(state.year, state.month, day);
          const entry = {
            income: incomeMap.get(dateKey) || 0,
            expense: spendingMap.get(dateKey) || 0
          };
          budgetCache.set(dateKey, entry);
          localStorage.setItem(key(state.year, state.month, day), JSON.stringify(entry));
        }
      } catch (error) {
        console.error("Failed to load budget data", error);
      } finally {
        renderCalendar();
        loadingMonthKey = "";
      }
    }

    function buildSelectors() {
      monthSelect.innerHTML = monthNames.map((m, i) => `<option value="${i}">${m}</option>`).join("");
      const startYear = today.getFullYear() - 3;
      const years = Array.from({ length: 8 }, (_, i) => startYear + i);
      yearSelect.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join("");
      syncSelectors();
    }

    function syncSelectors() {
      monthSelect.value = state.month;
      yearSelect.value = state.year;
      startDaySelect.value = state.startDay;
    }

    function renderWeekdays() {
      const names = state.startDay === 1 ? weekNamesMonday : weekNamesSunday;
      weekdaysEl.innerHTML = names.map(day => `<div class="weekday">${day}</div>`).join("");
    }

    function renderCalendar() {
      renderWeekdays();
      const daysInMonth = new Date(state.year, state.month + 1, 0).getDate();
      const prevMonthDays = new Date(state.year, state.month, 0).getDate();
      const firstDay = new Date(state.year, state.month, 1).getDay();
      const offset = state.startDay === 1 ? (firstDay + 6) % 7 : firstDay;
      const cells = [];

      for (let i = offset - 1; i >= 0; i--) {
        cells.push(dayBox(prevMonthDays - i, true));
      }

      for (let day = 1; day <= daysInMonth; day++) {
        cells.push(dayBox(day, false));
      }

      const totalCells = Math.max(35, Math.ceil(cells.length / 7) * 7);
      let nextDay = 1;
      while (cells.length < totalCells) {
        cells.push(dayBox(nextDay++, true));
      }

      calendarGrid.innerHTML = cells.join("");
      calendarGrid.querySelectorAll(".day:not(.other)").forEach(cell => {
        const day = Number(cell.dataset.day);

        cell.addEventListener("click", () => {
          state.selected = day;
          renderCalendar();
        });
      });
      updateSummary();
    }

    function dayBox(day, otherMonth) {
      const isToday = !otherMonth && day === today.getDate() && state.month === today.getMonth() && state.year === today.getFullYear();
      const isSelected = !otherMonth && day === state.selected;
      const data = otherMonth ? { income: 0, expense: 0 } : getSaved(day);
      const income = Number(data.income) || 0;
      const expense = Number(data.expense) || 0;
      const net = income - expense;
      const netClass = net < 0 ? "negative" : "";

      return `
        <div class="day ${otherMonth ? "other" : ""} ${isSelected ? "selected" : ""}" data-day="${day}">
          <div class="day-number">${day}</div>
          ${isToday ? `<div class="today-dot"></div>` : ""}
          ${otherMonth ? "" : `
            <div class="money-lines">
              <div class="income-input">${income > 0 ? money(income) : "No income"}</div>
              <div class="expense-input">Spending ${money(expense)}</div>
              <div class="net-line ${netClass}">Net ${money(net)}</div>
            </div>
          `}
        </div>`;
    }

    function updateSummary() {
      const daysInMonth = new Date(state.year, state.month + 1, 0).getDate();
      let income = 0;
      let expense = 0;

      for (let day = 1; day <= daysInMonth; day++) {
        const data = getSaved(day);
        income += Number(data.income) || 0;
        expense += Number(data.expense) || 0;
      }

      const net = income - expense;
      totalIncomeEl.textContent = money(income);
      totalExpenseEl.textContent = money(expense);
      totalNetEl.textContent = money(net);
      averageDayEl.textContent = money(net / Math.max(daysInMonth, 1));
    }

    document.getElementById("prevBtn").addEventListener("click", () => {
      state.month--;
      if (state.month < 0) { state.month = 11; state.year--; }
      state.selected = 1;
      syncSelectors();
      loadBudgetDataForMonth();
    });

    document.getElementById("nextBtn").addEventListener("click", () => {
      state.month++;
      if (state.month > 11) { state.month = 0; state.year++; }
      state.selected = 1;
      syncSelectors();
      loadBudgetDataForMonth();
    });

    document.getElementById("todayBtn").addEventListener("click", () => {
      state.month = today.getMonth();
      state.year = today.getFullYear();
      state.selected = today.getDate();
      syncSelectors();
      loadBudgetDataForMonth();
    });

    monthSelect.addEventListener("change", () => {
      state.month = Number(monthSelect.value);
      state.selected = 1;
      loadBudgetDataForMonth();
    });

    yearSelect.addEventListener("change", () => {
      state.year = Number(yearSelect.value);
      state.selected = 1;
      loadBudgetDataForMonth();
    });

    startDaySelect.addEventListener("change", () => {
      state.startDay = Number(startDaySelect.value);
      renderCalendar();
    });

    buildSelectors();
    loadBudgetDataForMonth();
  </script>
</body>
</html>
